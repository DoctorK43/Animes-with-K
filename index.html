<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimeVault</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0a0a0a;
  color: white;
}

/* HEADER */
header {
  display: flex;
  gap: 10px;
  padding: 10px;
  background: #111;
}

input {
  flex: 1;
  padding: 8px;
  border-radius: 6px;
  border: none;
}

/* GRID */
.gallery {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 5px;
  padding: 5px;
}

@media(min-width:600px){
  .gallery { grid-template-columns: repeat(3,1fr); }
}

.gallery img {
  width: 100%;
  display: block;
  border-radius: 8px;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: black;
}

.modal img {
  width: 100%;
}

#close {
  position: absolute;
  top: 10px;
  right: 15px;
  font-size: 25px;
  color: white;
}

button {
  padding: 10px;
  background: crimson;
  border: none;
  color: white;
  border-radius: 10px;
}

.actions {
  position: fixed;
  bottom: 20px;
  width: 100%;
  text-align: center;
}
</style>
</head>

<body>

<header>
  <b>AnimeVault</b>
  <input id="search" placeholder="Search...">
  <button onclick="login()">⚙️</button>
</header>

<div class="gallery" id="gallery"></div>

<div class="modal" id="modal">
  <span id="close">✕</span>
  <img id="modalImg">
  <div class="actions">
    <button onclick="downloadImage()">Download</button>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script>
// 🔥 ADD YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
  storageBucket: "YOUR_BUCKET",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

const OWNER_EMAIL = "kartikeyrathour991@gmail.com";

const gallery = document.getElementById("gallery");
const search = document.getElementById("search");

let currentImage = "";

// 🔥 LOCAL IMAGES (SAFE PATH)
const wallpapers = [
  "./vinland1.jpg",
  "./vinland2.jpg",
  "./vinland3.jpg",
  "./vinland4.jpg",
  "./vinland5.jpg"
];

// LOAD
async function loadWallpapers() {
  gallery.innerHTML = "";

  wallpapers.forEach(src => {
    if (src.toLowerCase().includes(search.value.toLowerCase())) {
      addImage(src);
    }
  });

  try {
    const snap = await db.collection("wallpapers").get();
    snap.forEach(doc => addImage(doc.data().url));
  } catch(e){}
}

// ADD IMAGE SAFELY
function addImage(src) {
  const img = document.createElement("img");

  img.src = src;

  // fallback if image fails
  img.onerror = () => {
    img.src = "https://via.placeholder.com/300x400?text=Image+Not+Found";
  };

  img.onclick = () => openModal(src);

  gallery.appendChild(img);
}

// SEARCH
search.addEventListener("input", loadWallpapers);

// LOGIN
function login() {
  const email = prompt("Email:");
  const pass = prompt("Password:");

  auth.signInWithEmailAndPassword(email, pass)
    .then(user => {
      if (user.user.email === OWNER_EMAIL) {
        showUpload();
      }
    });
}

// UPLOAD
function showUpload() {
  const btn = document.createElement("button");
  btn.innerText = "Upload";
  btn.onclick = uploadWallpaper;
  document.body.prepend(btn);
}

function uploadWallpaper() {
  const input = document.createElement("input");
  input.type = "file";

  input.onchange = async () => {
    const file = input.files[0];
    const ref = storage.ref("wallpapers/" + file.name);
    await ref.put(file);
    const url = await ref.getDownloadURL();

    await db.collection("wallpapers").add({url:url});
    loadWallpapers();
  };

  input.click();
}

// MODAL
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");

function openModal(src) {
  modal.style.display = "block";
  modalImg.src = src;
  currentImage = src;
}

document.getElementById("close").onclick = () => {
  modal.style.display = "none";
};

// DOWNLOAD FIX
async function downloadImage() {
  try {
    const res = await fetch(currentImage);
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "wallpaper.jpg";
    a.click();

    URL.revokeObjectURL(url);
  } catch {
    alert("Download failed ❌");
  }
}

// START
loadWallpapers();
</script>

</body>
</html>
