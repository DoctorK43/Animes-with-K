<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimeVault</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #0a0a0a;
  color: white;
}

/* HEADER */
header {
  position: sticky;
  top: 0;
  display: flex;
  gap: 10px;
  align-items: center;
  padding: 10px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
}

.logo {
  font-weight: bold;
}

.search {
  flex: 1;
  padding: 8px;
  border-radius: 8px;
  border: none;
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
  padding: 6px;
}

@media(min-width:600px){
  .gallery { grid-template-columns: repeat(3,1fr); }
}

.card {
  position: relative;
}

.card img {
  width: 100%;
  border-radius: 8px;
  display: block;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  z-index: 1000;
}

.modal img {
  width: 100%;
}

#close {
  position: absolute;
  top: 15px;
  right: 20px;
  font-size: 25px;
}

/* BUTTON */
.actions {
  position: fixed;
  bottom: 20px;
  width: 100%;
  text-align: center;
}

button {
  padding: 10px 20px;
  border: none;
  background: crimson;
  color: white;
  border-radius: 20px;
}
</style>
</head>

<body>

<header>
  <div class="logo">AnimeVault</div>
  <input id="search" class="search" placeholder="Search...">
  <button onclick="login()">⚙️</button>
</header>

<div class="gallery" id="gallery"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <span id="close">✕</span>
  <img id="modalImg">
  <div class="actions">
    <button id="downloadBtn">Download</button>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script>
// 🔥 PASTE YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
  storageBucket: "YOUR_BUCKET",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

const OWNER_EMAIL = "kartikeyrathour991@gmail.com";

const gallery = document.getElementById("gallery");
const search = document.getElementById("search");

// LOCAL IMAGES
const wallpapers = [
  "vinland1.jpg",
  "vinland2.jpg",
  "vinland3.jpg",
  "vinland4.jpg",
  "vinland5.jpg"
];

// LOAD IMAGES
async function loadWallpapers() {
  gallery.innerHTML = "";

  wallpapers.forEach(src => {
    if (src.toLowerCase().includes(search.value.toLowerCase())) {
      createCard(src);
    }
  });

  try {
    const snap = await db.collection("wallpapers").get();
    snap.forEach(doc => createCard(doc.data().url));
  } catch(e){}
}

// CREATE CARD
function createCard(src) {
  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `<img src="${src}" onclick="openModal('${src}')">`;

  gallery.appendChild(div);
}

// SEARCH
search.addEventListener("input", loadWallpapers);

// LOGIN
function login() {
  const email = prompt("Email:");
  const pass = prompt("Password:");

  auth.signInWithEmailAndPassword(email, pass)
    .then(user => {
      if (user.user.email === OWNER_EMAIL) {
        showUpload();
      }
    })
    .catch(err => alert(err.message));
}

// SHOW UPLOAD
function showUpload() {
  const btn = document.createElement("button");
  btn.innerText = "Upload";
  btn.onclick = uploadWallpaper;
  document.body.prepend(btn);
}

// UPLOAD
function uploadWallpaper() {
  const input = document.createElement("input");
  input.type = "file";

  input.onchange = async () => {
    const file = input.files[0];
    const ref = storage.ref("wallpapers/" + file.name);
    await ref.put(file);
    const url = await ref.getDownloadURL();

    await db.collection("wallpapers").add({url:url});
    loadWallpapers();
  };

  input.click();
}

// MODAL + DOWNLOAD FIX
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");
const downloadBtn = document.getElementById("downloadBtn");

let currentImage = "";

function openModal(src) {
  modal.style.display = "block";
  modalImg.src = src;
  currentImage = src;
}

downloadBtn.onclick = () => downloadImage(currentImage);

// 🔥 FIXED DOWNLOAD FUNCTION
async function downloadImage(url) {
  try {
    const response = await fetch(url);
    const blob = await response.blob();
    const blobUrl = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = blobUrl;
    a.download = url.split("/").pop().split("?")[0];

    document.body.appendChild(a);
    a.click();
    a.remove();

    URL.revokeObjectURL(blobUrl);
  } catch (e) {
    alert("Download failed ❌");
  }
}

// CLOSE MODAL
document.getElementById("close").onclick = () => {
  modal.style.display = "none";
};

// START
loadWallpapers();
</script>

</body>
</html>
